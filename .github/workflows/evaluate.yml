name: "Evaluate mainnet scripts"

on:
  schedule:
    - cron: "0 0 * * 6" # Run every Saturday at midnight

  workflow_dispatch:
    inputs:
      plutusRepo:
        description: "Plutus repository (owner/repo format)"
        required: false
        default: "IntersectMBO/plutus"
      plutusBranch:
        description: "Plutus branch to evaluate"
        required: false
        default: "master"
      useSSH:
        description: "Use SSH for git access (required for private repos)"
        required: false
        type: boolean
        default: false
      startFrom:
        description: Start evaluation from a record with specified primary key
        required: false
        default: "0"

jobs:
  build:
    name: Build
    runs-on: [plutus-node, self-hosted]
    timeout-minutes: 1440
    steps:
      - name: Checkout this Repo
        uses: actions/checkout@v4.3.0

      - name: Add GitHub SSH host key
        if: ${{ github.event.inputs.useSSH == 'true' }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Add plutus SRP to the cabal.project
        id: update_cabal_project
        working-directory: run-script-evaluations
        run: |
          NIX_PATH="nixpkgs=channel:nixos-unstable" \
            nix-shell -p nix-prefetch-git openssh --run \
            "./add_srp.sh --repo '${{ github.event.inputs.plutusRepo || 'IntersectMBO/plutus' }}' --branch '${{ github.event.inputs.plutusBranch || 'master' }}'${{ github.event.inputs.useSSH == 'true' && ' --ssh' || '' }}"

      - name: Evaluate
        working-directory: run-script-evaluations
        env:
          PGPASSWORD: ${{ secrets.PLUTUS_READER_PGPASS }}
        run: |
          nix develop --no-warn-dirty --accept-flake-config --impure \
            --command bash -c 'cabal clean && \
              cabal update && \
              cabal run exe:run-script-evaluations -- \
              --start-from=${{ github.event.inputs.startFrom || '0' }} \
              --database-conn-str "host=localhost port=5432 dbname=mainnet_plutus_events user=plutus-reader" \
              2>&1 | tee evaluation.log'

